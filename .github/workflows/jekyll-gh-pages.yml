name: Deploy Jekyll with GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_sha: ${{ steps.build.outputs.build_sha }}
      build_mode: ${{ steps.build.outputs.build_mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
      - name: Build
        id: build
        uses: ./journal/.github/actions/build
        with:
          try_latest: ${{ github.ref == 'refs/heads/main' }}

  write-back:
    needs: build
    if: github.ref == 'refs/heads/main' && needs.build.outputs.build_mode == 'latest'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Advance journal submodule pin
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git submodule update --init --depth=1 journal
          git -C journal fetch origin main
          git -C journal checkout "${{ needs.build.outputs.build_sha }}"
          git diff --quiet journal || {
            git add journal
            git commit -m "ci: advance journal to ${{ needs.build.outputs.build_sha }} [skip ci]"
            git push
          }
        shell: bash

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
