name: Deploy Jekyll with GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      JOURNAL_MOUNT: publish
      JOURNAL_BASE: journal
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # we will run some full rev parsing in scripts
          fetch-tags: true
          submodules: recursive
      - name: Build paragraphs blame
        run: git ls-files 'publish/**/index.md' | journal/bin/batch.sh 'journal/bin/stat-piece.sh'
      - name: Build paragraphs history
        run: git ls-files 'publish/**/index.md' | journal/bin/batch.sh 'journal/bin/stat-paragraphs.sh'
      - name: Build pieces activity history
        run: git ls-files 'publish/**/index.md' | journal/bin/stat-history.sh
        shell: bash
      - name: Sync journal engine assets into the site root
        run: |
          rsync -a --delete --exclude='contact/' journal/_includes/ _includes/
          rsync -a --delete journal/_layouts/   _layouts/
          rsync -a --delete journal/_plugins/   _plugins/
          rsync -a --delete journal/css/        css/
          rsync -a --delete journal/js/         js/
          rsync -a --delete journal/fonts/      fonts/
          rsync -a --delete journal/img/        img/
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        run: bundle exec jekyll build --config journal/_config.yml,_config.yml --destination _site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # Deployment job — main branch only
  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
