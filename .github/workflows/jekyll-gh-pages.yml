name: Deploy Jekyll with GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  journal:
    uses: fccn-antibody/journal.anecdote.channel/.github/workflows/build.yml@main
    permissions:
      contents: read
      pages: write
      id-token: write
