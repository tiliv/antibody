name: Roll journal submodule forward

# Cautiously advances the `journal/` engine pin to its latest HEAD — but only
# when the latest engine still builds this site cleanly. The build action is run
# with `try_latest: true`; it reports `build_mode: latest` when the newest journal
# HEAD built, or falls back to the pinned (known-good) commit otherwise. We only
# write the new pin back when the latest actually built, so a broken engine HEAD
# can never displace the known-good config.
#
# This complements the write-back already embedded in jekyll-gh-pages.yml: that
# one only rolls the pin forward on a push to main, so the engine could stall
# whenever no site/author content changes. This scheduled job picks up engine
# commits regardless.

on:
  schedule:
    - cron: '0 7 * * 1'  # Mondays 07:00 UTC — after the weekly author-submodule advance (06:00)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_sha: ${{ steps.build.outputs.build_sha }}
      build_mode: ${{ steps.build.outputs.build_mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
      - name: Build against latest journal
        id: build
        uses: ./journal/.github/actions/build
        with:
          try_latest: true

  write-back:
    needs: build
    if: needs.build.outputs.build_mode == 'latest'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Advance journal submodule pin
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git submodule update --init --depth=1 journal
          git -C journal fetch origin main
          git -C journal checkout "${{ needs.build.outputs.build_sha }}"
          git diff --quiet journal || {
            git add journal
            git commit -m "ci: roll journal forward to ${{ needs.build.outputs.build_sha }} [skip ci]"
            git push
          }
        shell: bash
