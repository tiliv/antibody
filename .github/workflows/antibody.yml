name: "Deploy civic-node's moniker site"

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_sha: ${{ steps.build.outputs.build_sha }}
      build_mode: ${{ steps.build.outputs.build_mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
      - name: Detect the Tell widget action in the pinned submodule
        # The node must build even when the tell/ pin is behind the action's introduction.
        # Probe for it so the render below is best-effort, not a hard cross-repo dependency.
        id: tellwidget
        shell: bash
        run: |
          if [ -f tell/.github/actions/widget/action.yml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tell/ pin predates the widget action — keeping committed _includes/widgets/tell.html"
          fi
      - name: Render this node's Tell widget
        # Regenerate the data-filled Tell fragment from THIS node's identity (atlas.yml)
        # straight into the served path widget/tell.html — a self-contained static file
        # (no Jekyll front matter, no include), so it never couples to the engine's
        # managed _includes. When the pinned tell ships the action this keeps every deploy
        # fresh; otherwise the committed widget/tell.html default stands. Same
        # submodule-path convention as the module-pin advances below.
        if: steps.tellwidget.outputs.present == 'true'
        uses: ./tell/.github/actions/widget
        with:
          out: widget/tell.html
      - name: Detect the Atlas widget action in the pinned submodule
        # Same best-effort probe as the Tell widget above: the node must build even when the
        # atlas/ pin is behind the action's introduction, so this is not a hard cross-repo
        # dependency.
        id: atlaswidget
        shell: bash
        run: |
          if [ -f atlas/.github/actions/widget/action.yml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::atlas/ pin predates the widget action — keeping committed widget/atlas.html"
          fi
      - name: Render this node's Atlas widget
        # Regenerate the data-filled Atlas fragment from THIS node's identity (atlas.yml)
        # straight into the served path widget/atlas.html — a self-contained static file
        # (no Jekyll front matter, no include), so it never couples to the engine's managed
        # _includes. Like the Tell widget it bakes a hub locator QR — the Atlas tier of the
        # same pattern, the single <atlas> label handed to the Atlas hub, which fills the
        # scanner's state and redirects. When the pinned atlas ships the action this keeps
        # every deploy fresh; otherwise the committed widget/atlas.html default stands.
        if: steps.atlaswidget.outputs.present == 'true'
        uses: ./atlas/.github/actions/widget
        with:
          out: widget/atlas.html
      - name: Detect the Journal widget action in the pinned submodule
        # Same best-effort probe as the Tell widget above: the node must build even when the
        # journal/ engine pin is behind the action's introduction, so this is not a hard
        # cross-repo dependency.
        id: journalwidget
        shell: bash
        run: |
          if [ -f journal/.github/actions/widget/action.yml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::journal/ pin predates the widget action — keeping committed widget/journal.html"
          fi
      - name: Render this node's Journal widget
        # Regenerate the data-filled Journal fragment from THIS node's identity (_config.yml)
        # straight into the served path widget/journal.html — a self-contained static file
        # (no Jekyll front matter, no include), so it never couples to the engine's managed
        # _includes. Unlike the Tell widget's hub locator, journal's QR points straight at
        # this node's own /journal/ — it is the node's own first-party record. When the
        # pinned journal ships the action this keeps every deploy fresh; otherwise the
        # committed widget/journal.html default stands.
        if: steps.journalwidget.outputs.present == 'true'
        uses: ./journal/.github/actions/widget
        with:
          out: widget/journal.html
      - name: Build
        id: build
        uses: ./journal/.github/actions/build
        with:
          try_latest: ${{ github.ref == 'refs/heads/main' }}

  write-back:
    needs: build
    if: github.ref == 'refs/heads/main' && needs.build.outputs.build_mode == 'latest'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Advance journal submodule pin
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git submodule update --init --depth=1 journal
          git -C journal fetch origin main
          git -C journal checkout "${{ needs.build.outputs.build_sha }}"
          git diff --quiet journal || {
            git add journal
            git commit -m "ci: advance journal to ${{ needs.build.outputs.build_sha }} [skip ci]"
            git push
          }
        shell: bash

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
