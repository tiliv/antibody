name: Journal engine upgrade

# Cautiously advances the `journal/` engine pin to its latest HEAD — but only
# when the latest engine still builds this site cleanly. The build-gate and
# write-back live in the journal-supplied `advance-engine` composite action, so
# this workflow only owns the schedule. That mirrors journal-engine-citations.yml,
# which composes `advance-submodules` to roll the author submodules forward: the
# journal is both the build source and the supplier of these actions, and the
# workspace repo keeps its scheduled workflows thin and easy to maintain.
#
# This complements the write-back embedded in antibody.yml: that one only rolls
# the pin forward on a push to main, so the engine could stall whenever no
# site/author content changes. This scheduled job picks up engine commits
# regardless.

on:
  schedule:
    - cron: '0 7 * * 1'  # Mondays 07:00 UTC — after the weekly author-submodule advance (06:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  advance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Advance journal engine pin
        uses: ./journal/.github/actions/advance-engine
