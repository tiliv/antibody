name: Advance author submodules to HEAD

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC — weekly content deadline
  workflow_dispatch:

permissions:
  contents: write

jobs:
  advance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: recursive
          fetch-depth: 0

      - name: Advance submodules
        uses: ./journal/.github/actions/advance-submodules
