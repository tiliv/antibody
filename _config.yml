title: ANTIBODY

# Published origin of this node. Read by the Atlas matchmaker (atlas/bin/match via
# .github/workflows/match.yml) as the `atlas_url` it signs into /matches.json, so this
# self-hosted Atlas attributes matches to its own URL rather than the upstream default.
url: "https://antibody.fort-collins.colorado.anecdote.channel"

# The workspace root is the publish root. Journal prose lives at journal/ and
# serves at /journal/ (disk path == url path; the engine ships the `journal` mount
# default, so this node need not repeat it). Engine machinery is hidden under the
# dotted .*-engine submodules.

# Site-owned exclude. Declaring it here REPLACES the engine default on merge, so it
# re-lists the engine's entries. The dotted .*-engine mounts are also auto-ignored
# by Jekyll (dotfiles); atlas/ and tell/ are reserved pass-through prefixes, built
# and deployed by their own engines — never by this node's Jekyll build.
exclude:
  - CNAME
  - .bundle
  - Gemfile
  - Gemfile.lock
  - vendor
  - .journal-engine/
  - .atlas-engine/
  - .tell-engine/
  - atlas/
  - tell/
  - node_modules
  - package.json
  - package-lock.json
  - README.md
  - LICENSE.md
  - AGENTS.md
  - .github
  - bin

# Page defaults. Jekyll REPLACES this array on config merge (the engine's _config.yml
# loads first and this file wins), so we re-list the engine's two entries verbatim and
# add this node's `author`. The journal layout builds its per-article contact include as
# contact/<author>.md and renders {{ page.author }} inside it; the publish/ → journal/
# move (169b114, "Make the workspace root the publish root") relocated the content without
# re-declaring the author, so page.author went empty and the include path collapsed to
# `contact/.md` (the build's "Invalid syntax for include tag" failure). Declaring author at
# the journal path here — alongside the engine's own layout default — restores it.
defaults:
  - scope: {path: ""}
    values:
      preferences: journal
  - scope: {path: "journal"}
    values:
      layout: journal
      author: autumn-ryan

license_badge: https://img.shields.io/static/v1?label=Hippocratic%20License&message=HL3-BDS-MEDIA-SUP-SV&labelColor=5e2751&color=2a6a65
license_url: https://firstdonoharm.dev/version/3/0/bds-media-sup-sv.html
civic_node: Fort Collins
civic_abbr: FCCN
civic_tag: For immediate replication
repo_url: https://github.com/tiliv/antibody
repo_name: tiliv/antibody
og_description: >-
  We assert that there are degrees of information quality, that we must not
  struggle to distinguish them and that they are these: 1) First-party claims
  with metadata, 2) Hearsay and 3) Fraud.

preferences:
  dark: false
  year: "2026"
